# Change prefix
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# Force bash as default shell
set -g default-shell /usr/bin/fish
# set -g default-command fish

set -g history-limit 10000
set -g allow-rename off

# Enable vi keys
setw -g mode-keys vi

# Xterm-keys is necessary for emacs in tmux
set-window-option -g xterm-keys on

# Copy/Paste tricks
bind Escape copy-mode
# bind -T vi-copy v begin-selection
# bind -T vi-copy y copy-selection
unbind C-y
bind C-y paste-buffer
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

# Setting delay between prefix and command
set -s escape-time 1

# Change the base index of the windows and the panes
set  -g base-index      1
setw -g pane-base-index 1

# Set a prefix shortcut for reloading your tmux config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded !"

# Remap pane navigation to vim
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

# Pane resizing
unbind H
bind -r H resize-pane -L 5
unbind J
bind -r J resize-pane -D 5
unbind K
bind -r K resize-pane -U 5
unbind L
bind -r L resize-pane -R 5

# Use h and l for window selection
unbind C-h
bind -r C-h select-window -t:-
unbind C-l
bind -r C-l select-window -t:+

bind -n S-Left  previous-window
bind -n S-Right next-window

# Splitting panes with | and -
bind | split-window -h
bind - split-window -v

# Rename your terminals
set -g set-titles on
set -g set-titles-string '#(whoami) :: #h'

# Enable mouse interaction
set -g mouse on

# Set default terminal
set -g default-terminal "screen-256color"
# Color tweaks
set -ga terminal-overrides ",screen-256color:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:RGB"

# Style customizations
set -g status-style fg=white,bg=black
set -g message-style fg=white,bold,bg=black
setw -g window-status-style fg=cyan,bg=black
setw -g window-status-current-style fg=black,bg=cyan
setw -g pane-border-style fg=white,bg=black
setw -g pane-active-border-style fg=blue,bg=black

# Status bar customization
set -g status-interval 60
set -g status-left-length 90
set -g status-right-length 60
set -g status-left "#[fg=Green]#(whoami)#[fg=white] :: #[default]#(hostname -s)#[fg=cyan] (S: #S)"
set -g status-justify centre
set -g status-right '#[fg=yellow]#(cut -d " " -f 1-3 /proc/loadavg)#[default] #[fg=white]%a %d %b %R#[default]'

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity on
